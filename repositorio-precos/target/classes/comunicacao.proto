syntax = "proto3";

package precos;

message Preco {
  string ativo = 1;
  double valor = 2;
  int64 timestamp = 3;
}

message ValidaPrecoRequest {
  Preco preco = 1;
}

message ValidaPrecoResponse {
  bool valido = 1;
  string mensagem = 2;
}

message ArmazenaPrecoRequest {
  Preco preco = 1;
}

message ArmazenaPrecoResponse {
  bool sucesso = 1;
  string mensagem = 2;
}

message ProcessaPrecoRequest {
  Preco preco = 1;
}

message ProcessaPrecoResponse {
  bool sucesso = 1;
  int32 codigo = 2;
  string mensagem = 3;
  int32 replicas = 4;
}

message HeartbeatRequest {
  string host = 1;
  int32 port = 2;
  string tipo = 3;
}

message HeartbeatResponse {
  bool ok = 1;
  string mensagem = 2;
}

service GatewayPrecos {
  rpc ProcessarPreco (ProcessaPrecoRequest) returns (ProcessaPrecoResponse);
}

service HeartbeatGateway {
  rpc RegistrarHeartbeat (HeartbeatRequest) returns (HeartbeatResponse);
}

service ValidadorPrecos {
  rpc ValidarPreco (ValidaPrecoRequest) returns (ValidaPrecoResponse);
}

service RepositorioPrecos {
  rpc ArmazenarPreco (ArmazenaPrecoRequest) returns (ArmazenaPrecoResponse);
}