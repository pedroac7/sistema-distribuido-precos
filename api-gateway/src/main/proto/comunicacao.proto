syntax = "proto3";

package precos;

// Mensagem base para transmissao de preços
message Preco {
  string ativo = 1;
  double valor = 2;
  int64 timestamp = 3;
}

// Requisicao do Gateway para Validador
message ValidaPrecoRequest {
  Preco preco = 1;
}

// Resposta do Validador
message ValidaPrecoResponse {
  bool valido = 1;
  string mensagem = 2;
}

// Requisicao do Gateway para Repositorio
message ArmazenaPrecoRequest {
  Preco preco = 1;
}

// Resposta do Repositorio
message ArmazenaPrecoResponse {
  bool sucesso = 1;
  string mensagem = 2;
}

// Servico do Validador
service ValidadorPrecos {
  rpc ValidarPreco (ValidaPrecoRequest) returns (ValidaPrecoResponse);
}

// Servico do Repositorio
service RepositorioPrecos {
  rpc ArmazenarPreco (ArmazenaPrecoRequest) returns (ArmazenaPrecoResponse);
}
